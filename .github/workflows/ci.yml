name: ci

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    name: frontend
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  rust:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (WebKitGTK)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libayatana-appindicator3-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: cargo fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: cargo test
        if: matrix.target == 'x86_64-unknown-linux-gnu' || startsWith(matrix.os, 'macos')
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-features

      - name: cargo build (release + custom-protocol)
        run: cargo build --manifest-path src-tauri/Cargo.toml --release --target ${{ matrix.target }} --features custom-protocol

      - uses: actions/upload-artifact@v4
        with:
          name: ci-binary-${{ matrix.target }}
          if-no-files-found: ignore
          path: |
            src-tauri/target/${{ matrix.target }}/release/GrokTask
            src-tauri/target/${{ matrix.target }}/release/GrokTask.exe
